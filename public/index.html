<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#22C55E" />
    <meta name="description" content="FitQuest — Your gamified fitness journey. Track workouts, earn XP, and level up your fitness with personalized programs." />

    <!-- PWA / Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FitQuest" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitQuest" />

    <!-- Open Graph -->
    <meta property="og:title" content="FitQuest — Gamified Fitness Tracker" />
    <meta property="og:description" content="Track workouts, earn XP, and level up your fitness with personalized programs." />
    <meta property="og:type" content="website" />

    <title>FitQuest — Gamified Fitness Tracker</title>

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts with preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run FitQuest.</noscript>
    <div id="root"></div>
  </body>
</html>
